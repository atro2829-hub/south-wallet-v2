name: "🛡️ محفظة الجنوب — Admin App (Android)"

on:
  push:
    branches: [main]
    paths:
      - "south-admin/src/**"
      - "south-admin/public/**"
      - "south-admin/resources/**"
      - "south-admin/capacitor.config.ts"
      - "south-admin/next.config.ts"
      - "south-admin/package.json"
      - ".github/workflows/build-admin-app.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options: [release, debug]

env:
  JAVA_VERSION: "21"
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"

jobs:
  build:
    name: "🔨 Build & Sign Admin APK"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Install Node.js 22"
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version && npm --version

      - name: "☕ Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🤖 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "✅ Accept SDK licenses"
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: "🔧 Install SDK components"
        run: |
          sdkmanager --install "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" || true
          sdkmanager --install "platform-tools" || true

      - name: "📦 Install npm dependencies"
        working-directory: south-admin
        run: npm ci --legacy-peer-deps --no-audit --no-fund
        timeout-minutes: 10

      - name: "🗑️ Remove any API routes (static export incompatible)"
        run: rm -rf south-admin/src/app/api || true

      - name: "🏗️ Build Next.js static export"
        working-directory: south-admin
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY }}

      - name: "🖼️ Install @capacitor/assets"
        run: npm install -g @capacitor/assets@latest

      - name: "🎨 Generate all launcher icon densities from resources/icon.png"
        working-directory: south-admin
        run: |
          if [ -f "resources/icon.png" ]; then
            npx @capacitor/assets generate \
              --iconBackgroundColor '#5C1A1B' \
              --iconBackgroundColorDark '#1A0A0E' \
              --splashBackgroundColor '#1A0A0E' \
              --splashBackgroundColorDark '#1A0A0E' \
              --android
            echo "✅ Admin icon assets generated"
          else
            echo "⚠️ south-admin/resources/icon.png not found — using existing icons"
          fi

      - name: "🔄 Capacitor sync android"
        working-directory: south-admin
        run: npx cap sync android

      - name: "🔐 Decode keystore"
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > south-wallet.keystore
        continue-on-error: true

      - name: "🏗️ Build APK"
        working-directory: south-admin/android
        run: |
          chmod +x gradlew
          if [ -f "../../south-wallet.keystore" ]; then
            echo "→ Building SIGNED release APK"
            ./gradlew assembleRelease \
              -PMYAPP_UPLOAD_STORE_FILE=../../../south-wallet.keystore \
              -PMYAPP_UPLOAD_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PMYAPP_UPLOAD_KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PMYAPP_UPLOAD_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
              --stacktrace
          else
            echo "⚠️ Keystore not found — building debug APK"
            ./gradlew assembleDebug --stacktrace
          fi

      - name: "⬆️ Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: "south-wallet-admin-${{ github.run_number }}"
          path: |
            south-admin/android/app/build/outputs/apk/release/app-release.apk
            south-admin/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

  notify:
    name: "📣 Build Status"
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "Result"
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Admin app build SUCCEEDED — APK ready in Artifacts tab"
          else
            echo "❌ Admin app build FAILED"
            exit 1
          fi
