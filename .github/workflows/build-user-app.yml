name: "📱 محفظة الجنوب — User App (Android)"

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "resources/**"
      - "capacitor.config.ts"
      - "next.config.ts"
      - "package.json"
      - ".github/workflows/build-user-app.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options: [release, debug]

env:
  APP_ID: com.qtbm.south
  APP_NAME: "محفظة الجنوب"
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  WORKING_DIR: "."

jobs:
  # ─────────────────────────────────────────
  build:
    name: "🔨 Build & Sign APK"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: ./south-wallet-v2

    steps:
      # 1 — Checkout
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      # 2 — Node.js setup
      - name: "⚙️ Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "south-wallet-v2/package-lock.json"

      # 3 — Java (Android SDK needs it)
      - name: "☕ Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      # 4 — Android SDK
      - name: "🤖 Setup Android SDK"
        uses: android-actions/setup-android@v3

      # 5 — Install Node dependencies
      - name: "📦 Install dependencies"
        run: npm ci --legacy-peer-deps

      # 6 — Set env variables for build
      - name: "🔑 Write .env.local"
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_ENV=production
          EOF

      # 7 — Next.js static export
      - name: "🏗️ Build Next.js (static export)"
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # 8 — Install Capacitor CLI globally
      - name: "⚡ Install Capacitor CLI"
        run: npm install -g @capacitor/cli@latest

      # 9 — Add Android platform (idempotent)
      - name: "🤖 Add Android platform"
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping add"
          fi

      # 10 — Install @capacitor/assets for icon generation
      - name: "🖼️ Install Capacitor Assets tool"
        run: npm install -g @capacitor/assets@latest

      # 11 — Generate Android icon assets from resources/icon.png
      - name: "🎨 Generate launcher icons & splash screens"
        run: |
          npx @capacitor/assets generate \
            --iconBackgroundColor '#5C1A1B' \
            --iconBackgroundColorDark '#1A0A0E' \
            --splashBackgroundColor '#1A0A0E' \
            --splashBackgroundColorDark '#1A0A0E' \
            --android

      # 12 — Sync web assets + plugins to Android
      - name: "🔄 Capacitor sync"
        run: npx cap sync android

      # 13 — Make Gradle wrapper executable
      - name: "🔧 Fix Gradle permissions"
        run: chmod +x android/gradlew

      # 14 — Decode keystore from secret
      - name: "🔐 Decode release keystore"
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/release.jks
        continue-on-error: true  # Will build debug if keystore not set

      # 15 — Build APK
      - name: "🏗️ Build Release APK"
        working-directory: south-wallet-v2/android
        run: |
          if [ -f "app/keystore/release.jks" ]; then
            echo "Building SIGNED release APK…"
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=keystore/release.jks \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
          else
            echo "⚠️ Keystore not set — building DEBUG APK"
            ./gradlew assembleDebug
          fi

      # 16 — Find & rename APK
      - name: "📦 Locate built APK"
        id: apk
        working-directory: south-wallet-v2
        run: |
          APK=$(find android -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      # 17 — Upload APK artifact
      - name: "⬆️ Upload APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "south-wallet-user-${{ github.run_number }}"
          path: "south-wallet-v2/${{ steps.apk.outputs.path }}"
          retention-days: 30

      # 18 — Comment on PR with download link
      - name: "💬 Comment APK link on PR"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📱 محفظة الجنوب — Build #${{ github.run_number }}\n\n✅ APK جاهز للتحميل من تبويب **Actions → Artifacts**\n\n- App ID: \`com.qtbm.south\`\n- Commit: \`${{ github.sha }}\``
            });

  # ─────────────────────────────────────────
  notify:
    name: "📣 Build Status"
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "✅ Build succeeded"
        if: needs.build.result == 'success'
        run: echo "✅ User app build succeeded — APK uploaded"
      - name: "❌ Build failed"
        if: needs.build.result == 'failure'
        run: echo "❌ User app build FAILED — check logs above" && exit 1
